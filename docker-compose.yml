services:
  api:
    build: ./backend
    container_name: realestate-api
    ports:
      - "8000:8000"
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      BROWSE_QUEUE: browse_tasks
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: realestate-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  selenium-hub:
    image: selenium/hub:4.24.0
    container_name: realestate-selenium-hub
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  selenium-chrome:
    image: selenium/node-chrome:4.24.0
    container_name: realestate-selenium-chrome
    shm_size: 2gb
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 2
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"
    depends_on:
      selenium-hub:
        condition: service_healthy
    restart: unless-stopped

  consumer:
    build: ./consumer
    container_name: realestate-consumer
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      BROWSE_QUEUE: browse_tasks
      SELENIUM_HUB_URL: http://selenium-hub:4444/wd/hub
      PAGE_LOAD_TIMEOUT: "45"
    depends_on:
      rabbitmq:
        condition: service_healthy
      selenium-hub:
        condition: service_healthy
      selenium-chrome:
        condition: service_started
    restart: unless-stopped
